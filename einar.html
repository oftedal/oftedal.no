<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einar Oftedal &middot; Oftedal</title>
<meta name="description" content="Einar Oftedal — Oftedal family.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232C2C2A'/%3E%3Ctext x='48' y='70' font-family='Georgia,serif' font-size='52' font-weight='600' fill='%23F5F4F0' text-anchor='middle'%3EO%3C/text%3E%3Ccircle cx='70' cy='62' r='5' fill='%23C89B6A'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2C2C2A;
    --ink-soft:#5F5E5A;
    --ink-faint:#888780;
    --line:#E2E0D8;
    --paper:#F7F6F1;
    --card:#FFFFFF;
    --bronze:#9A6A3C;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 28px;}
  .back{
    display:inline-flex;align-items:center;gap:7px;
    font-size:12px;letter-spacing:1px;color:var(--ink-faint);
    text-decoration:none;margin-top:40px;
    transition:color .25s ease;
  }
  .back:hover{color:var(--ink);}
  .back .arrow{transition:transform .25s ease;}
  .back:hover .arrow{transform:translateX(-3px);}
  header{padding:40px 0 12px;}
  .initial{
    font-family:var(--serif);font-size:64px;font-weight:500;
    color:var(--bronze);line-height:1;display:inline-block;margin-bottom:16px;
  }
  .name{
    font-family:var(--serif);font-size:54px;font-weight:500;
    color:var(--ink);line-height:1.05;letter-spacing:-.5px;
  }
  span.dot{color:var(--bronze);}
  .rule{height:1px;background:var(--line);margin:48px 0;}
  .eyebrow{
    font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--ink-faint);margin-bottom:24px;
  }
  .actions{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .actions a{
    display:inline-flex;align-items:center;gap:6px;
    font-family:var(--sans);font-size:12px;letter-spacing:1px;
    color:var(--ink-soft);text-decoration:none;
    transition:color .25s ease;
  }
  .actions a:hover{color:var(--ink);}
  .actions a svg{width:15px;height:15px;display:block;}
  .actions .li svg{fill:var(--ink-soft);transition:fill .25s ease;}
  .actions .li:hover svg{fill:#0A66C2;}
  .actions .web svg{stroke:var(--ink-soft);fill:none;transition:stroke .25s ease;}
  .actions .web:hover svg{stroke:var(--bronze);}
  .actions .em svg{stroke:var(--ink-soft);fill:none;transition:stroke .25s ease;}
  .actions .em:hover svg{stroke:var(--bronze);}
  .actions .gh svg{fill:var(--ink-soft);transition:fill .25s ease;}
  .actions .gh:hover svg{fill:#24292F;}
  .photos{
    display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  }
  .photo-slot{
    background:var(--card);border:1px solid var(--line);
    border-radius:4px;aspect-ratio:3/4;
    display:flex;align-items:center;justify-content:center;
  }
  .photo-slot img{
    width:100%;height:100%;object-fit:cover;border-radius:3px;display:block;
  }
  footer{padding:56px 0 64px;}
  .foot-text{font-size:12px;color:var(--ink-faint);line-height:1.7;letter-spacing:.3px;}
  .foot-text a{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line);}
  .foot-text a:hover{color:var(--ink);}
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s ease;}
  .reveal.in{opacity:1;transform:none;}
  @media (max-width:680px){
    .name{font-size:40px;}
    header{padding:28px 0 8px;}
    .photos{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html"><span class="arrow">&larr;</span> Oftedal<span class="dot">.</span>no</a>
  <header class="reveal">
    <div class="initial">E</div>
    <h1 class="name">Einar Oftedal<span class="dot">.</span></h1>
  </header>
  <div class="rule"></div>

  <section class="reveal">
    <p class="eyebrow">Links</p>
    <div class="actions">
      <a class="li" href="https://www.linkedin.com/in/einaroftedal" target="_blank" rel="noopener noreferrer" aria-label="Einar Oftedal on LinkedIn"><svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 110-4.13 2.06 2.06 0 010 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/></svg> LinkedIn</a>
      <a class="gh" href="https://github.com/oftedal" target="_blank" rel="noopener noreferrer" aria-label="Einar Oftedal on GitHub"><svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg> GitHub</a>
      <a class="web" href="https://einar.oftedal.no" target="_blank" rel="noopener noreferrer" aria-label="Einar Oftedal website"><svg viewBox="0 0 24 24" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg> Website</a>
      <a class="em" data-user="einar" data-domain="oftedal" data-tld="no" href="#"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg> Email</a>
    </div>
  </section>

  <div class="rule"></div>

  <section class="reveal">
    <p class="eyebrow">Photos</p>
    <div class="photos">
      <div class="photo-slot"></div>
      <div class="photo-slot"></div>
      <div class="photo-slot"></div>
    </div>
  </section>

  <footer class="reveal">
    <p class="foot-text">&copy; 2026 OFTEDAL<span class="dot">.</span>NO &ndash; <a href="mailto:post@oftedal.no">POST@OFTEDAL<span class="dot">.</span>NO</a></p>
  </footer>
</div>
<script>
  (function(){
    document.querySelectorAll('a.em').forEach(function(a){
      var u=a.getAttribute('data-user');
      var d=a.getAttribute('data-domain');
      var t=a.getAttribute('data-tld');
      if(u&&d&&t) a.href='mailto:'+u+'@'+d+'.'+t;
    });
  })();
  const obs=new IntersectionObserver((es)=>{
    es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});
  },{threshold:.12});
  document.querySelectorAll('.reveal').forEach((el,i)=>{el.style.transitionDelay=(i*90)+'ms';obs.observe(el);});
</script>
</body>
</html>

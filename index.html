<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oftedal.no</title>
<meta name="description" content="Oftedal.no — the Oftedal family online.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232C2C2A'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='44' font-weight='600' fill='%23F5F4F0' text-anchor='middle'%3EO%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2C2C2A;
    --ink-soft:#5F5E5A;
    --ink-faint:#888780;
    --line:#E2E0D8;
    --paper:#F7F6F1;
    --card:#FFFFFF;
    --bronze:#9A6A3C;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 28px;}
  header{padding:96px 0 12px;}
  .welcome{
    font-family:var(--serif);
    font-size:54px;
    font-weight:500;
    color:var(--ink);
    line-height:1.05;
    letter-spacing:-.5px;
  }
  .welcome .dot{color:var(--bronze);}
  .sub{
    font-family:var(--serif);
    font-size:22px;
    font-weight:400;
    color:var(--ink-soft);
    margin-top:20px;
    max-width:520px;
    line-height:1.45;
  }
  .rule{height:1px;background:var(--line);margin:56px 0;}
  .eyebrow{
    font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--ink-faint);margin-bottom:24px;
  }
  .callout{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:34px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
    flex-wrap:wrap;
    transition:border-color .3s ease;
  }
  .callout:hover{border-color:var(--bronze);}
  .callout .c-left{display:flex;align-items:center;gap:22px;}
  .callout .c-mark{display:inline-flex;align-items:flex-start;}
  .callout .c-mark .m{font-family:var(--serif);font-size:46px;font-weight:500;color:var(--ink);line-height:.9;}
  .callout .c-mark .d{width:5px;height:5px;border-radius:50%;background:var(--bronze);margin-left:4px;margin-top:8px;}
  .callout .c-text .ct-title{font-family:var(--serif);font-size:22px;color:var(--ink);line-height:1.2;}
  .callout .c-text .ct-sub{font-size:13px;color:var(--ink-soft);margin-top:3px;}
  .btn{
    font-family:var(--sans);
    font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--ink);
    text-decoration:none;
    border:1px solid var(--ink);
    border-radius:3px;
    padding:11px 22px;
    white-space:nowrap;
    transition:background .25s ease,color .25s ease;
  }
  .btn:hover{background:var(--ink);color:var(--paper);}
  .people{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .person{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:30px;
    text-decoration:none;
    color:inherit;
    display:block;
    transition:border-color .3s ease,transform .3s ease;
  }
  .person:hover{border-color:var(--bronze);transform:translateY(-2px);}
  .person .initial{
    font-family:var(--serif);font-size:30px;font-weight:500;color:var(--bronze);
    line-height:1;display:inline-block;margin-bottom:10px;
  }
  .person .pname{font-family:var(--serif);font-size:26px;font-weight:500;color:var(--ink);line-height:1.1;}
  .person .plink{
    font-size:12px;letter-spacing:1px;color:var(--ink-soft);margin-top:8px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .person .plink .arrow{transition:transform .25s ease;}
  .person:hover .plink .arrow{transform:translateX(3px);}
  footer{padding:64px 0;}
  .foot-text{font-size:12px;color:var(--ink-faint);line-height:1.7;letter-spacing:.3px;}
  .foot-text a{color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line);}
  .foot-text a:hover{color:var(--ink);}
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s ease;}
  .reveal.in{opacity:1;transform:none;}
  @media (max-width:680px){
    header{padding:64px 0 8px;}
    .welcome{font-size:40px;}
    .sub{font-size:19px;}
    .callout{flex-direction:column;align-items:flex-start;}
    .people{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="reveal">
    <h1 class="welcome">Welcome to Oftedal<span class="dot">.</span>no</h1>
    <p class="sub">The Oftedal family online.</p>
  </header>
  <div class="rule"></div>
  <section class="reveal">
    <p class="eyebrow">Looking for 4E?</p>
    <a class="callout" href="4e.html" style="text-decoration:none;color:inherit;">
      <div class="c-left">
        <span class="c-mark"><span class="m">4E</span><span class="d"></span></span>
        <div class="c-text">
          <div class="ct-title">4E Capital &amp; 4E Management</div>
          <div class="ct-sub">The family holding and operations group</div>
        </div>
      </div>
      <span class="btn">Visit 4E &rarr;</span>
    </a>
  </section>
  <div class="rule"></div>
  <section class="reveal">
    <p class="eyebrow">People</p>
    <div class="people">
      <a class="person" href="https://linkedin.com/in/einaroftedal" target="_blank" rel="noopener noreferrer">
        <span class="initial">E</span>
        <div class="pname">Einar Oftedal</div>
        <span class="plink">LinkedIn <span class="arrow">&rarr;</span></span>
      </a>
      <a class="person" href="https://erlend.oftedal.no" target="_blank" rel="noopener noreferrer">
        <span class="initial">E</span>
        <div class="pname">Erlend Oftedal</div>
        <span class="plink">erlend.oftedal.no <span class="arrow">&rarr;</span></span>
      </a>
    </div>
  </section>
  <footer class="reveal">
    <p class="foot-text">
      Oftedal.no &middot; Norway<br>
      <a href="mailto:post@oftedal.no">post@oftedal.no</a>
    </p>
  </footer>
</div>
<script>
  const obs=new IntersectionObserver((es)=>{
    es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});
  },{threshold:.12});
  document.querySelectorAll('.reveal').forEach((el,i)=>{el.style.transitionDelay=(i*90)+'ms';obs.observe(el);});
</script>
</body>
</html>
